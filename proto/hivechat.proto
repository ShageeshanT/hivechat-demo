// HiveChat - Protocol Buffer Definitions
// Compile with:
//   python -m grpc_tools.protoc -I proto --python_out=proto --grpc_python_out=proto proto/hivechat.proto

syntax = "proto3";

package hivechat;

// ─────────────────────────────────────────────
// Shared message types
// ─────────────────────────────────────────────

message ChatMessage {
  string message_id   = 1;
  string sender       = 2;
  string receiver     = 3;
  string content      = 4;
  double timestamp    = 5;
  string origin_node  = 6;
}

message StatusResponse {
  bool   success      = 1;
  string status       = 2;
  string message_id   = 3;
  string node_id      = 4;
}

// ─────────────────────────────────────────────
// MessagingService – client ↔ node
// ─────────────────────────────────────────────

message SendMessageRequest {
  ChatMessage message = 1;
}

message GetMessagesRequest {
  string node_id = 1;    // which node to pull from
}

message GetMessagesResponse {
  repeated ChatMessage messages = 1;
}

service MessagingService {
  // Client sends a new chat message to a node
  rpc SendMessage (SendMessageRequest) returns (StatusResponse);

  // Recovering node pulls all stored messages from a peer
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse);
}

// ─────────────────────────────────────────────
// FaultService – node ↔ node (fault tolerance)
// ─────────────────────────────────────────────

message HeartbeatRequest {
  string sender_node_id = 1;
}

message HeartbeatResponse {
  bool   alive   = 1;
  string node_id = 2;
}

message ReplicateRequest {
  ChatMessage message       = 1;
  string      source_node_id = 2;
}

service FaultService {
  // Liveness probe between nodes
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);

  // Primary node pushes a replica to a peer
  rpc Replicate (ReplicateRequest) returns (StatusResponse);
}

// ─────────────────────────────────────────────
// TimeSyncService – node ↔ reference node (Time Synchronization)
// ─────────────────────────────────────────────

message TimeSyncRequest {
  int32  node_id          = 1;
  double client_send_time = 2;
}

message TimeSyncResponse {
  double client_send_time = 1;
  double server_time      = 2;
  int32  server_node_id   = 3;
}

service TimeSyncService {
  // Client node asks reference node for the current server time to compute clock offset
  rpc GetTime (TimeSyncRequest) returns (TimeSyncResponse);
}
